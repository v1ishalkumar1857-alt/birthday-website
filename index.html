<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="stars"></div>

<div id="balloons">
    <div class="balloon red"></div>
    <div class="balloon blue"></div>
    <div class="balloon yellow"></div>
    <div class="balloon green"></div>
    <div class="balloon pink"></div>
</div>

<audio id="birthdayMusic" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>
    
<div id="background"></div>

<div class="container">

    <div id="magicLight"></div>

<div id="cake" class="hidden">
    <div class="cake-base"></div>
    <div class="cake-layer"></div>

    <div class="candle">
        <div class="flame"></div>
    </div>
</div>

<h2 id="message"></h2>
    
<h1 class="title">
Happy Birthday 🎉
</h1>

<p class="subtitle">
Tap the Gift
</p>

<div class="gift" id="gift">

    <div class="gift-lid">
        <div class="bow bow-left"></div>
        <div class="bow bow-right"></div>
        <div class="ribbon-vertical"></div>
    </div>

    <div class="gift-box">
        <div class="ribbon-horizontal"></div>
        <div class="ribbon-vertical"></div>
    </div>

</div>
  
</div>
    
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
